name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build component packages
        # 构建除 docs 外的全部包（对齐 ci.yml），避免新增包（如 icons-lab）漏进硬编码清单导致 docs build 找不到 dist
        run: pnpm --filter='!@chenzy-design/docs' build

      - name: Build docs
        run: pnpm --filter @chenzy-design/docs build
        env:
          BASE_PATH: /chenzy-design

      - name: Run Pagefind
        run: pnpm --filter @chenzy-design/docs exec pagefind --site build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: packages/docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
