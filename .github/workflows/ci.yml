name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # pnpm version comes from package.json "packageManager" (single source of truth)
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # build first so downstream packages' dist/*.d.ts exist before typecheck
      - run: pnpm build
      # WCAG AA 对比度门禁：审计 alias token 的正文级前景/背景对，
      # 任一非豁免对 < 4.5:1 即阻断（防 token 改色引入 a11y 回归）。
      - run: pnpm a11y:contrast
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      # a11y 门禁：vitest-axe 渲染测试（61 组件，axe 0 violations + role/aria 断言）。
      - run: pnpm test:a11y
      # 体积门禁（size-limit）：dist 由上面的 build 产出，size-limit 读 dist 测真实
      # bundle 后的 gzip，与各组件 spec §9 的「svelte 渲染层」预算逐条比对。
      # 预算已按真实实测 + ~15% 余量校准基线，超预算即阻断（防体积回归）。
      - run: pnpm perf:check
