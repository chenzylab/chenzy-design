name: ✨ 功能 / 组件请求
description: 建议新组件、新能力或改进
title: '[Feature] '
labels: [enhancement]
body:
  - type: dropdown
    id: kind
    attributes:
      label: 类型
      options:
        - 新组件
        - 现有组件新增能力
        - 主题 / Token
        - 国际化
        - 性能
        - 工程 / DX
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / 场景
      description: 你遇到的实际需求是什么？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 期望的 API / 行为；可参考 Semi Design 对应组件
    validations:
      required: false
  - type: input
    id: spec
    attributes:
      label: 关联 SPEC
      description: 若已有对应规格，请填路径
      placeholder: specs/components/<category>/<Component>.spec.md
    validations:
      required: false
