version: 2
updates:
  # pnpm 依赖（根 + 各 workspace 包由根 lockfile 统一管理）
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # 把非破坏性更新合并成一个 PR，减少噪音
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies

  # GitHub Actions 版本更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: ci(deps)
    labels:
      - dependencies
      - ci
